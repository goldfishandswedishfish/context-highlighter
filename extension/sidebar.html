<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Context Highlighter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a12; --surface: #12121e; --surface2: #1a1a2e; --border: #22223a; --accent: #e8d5b7; --accent-dim: #a89880; --accent-faint: #e8d5b715; --text: #ddd0bb; --muted: #55556a; --danger: #c45c5c; --green: #7ab87a; --green-bg: #1a2e1a; --green-text: #a8d5a8; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; }
    .header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: 0.3px; margin-bottom: 12px; }
    .search-bar { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
    .search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: 'Lora', serif; font-size: 12px; width: 100%; }
    .search-bar input::placeholder { color: var(--muted); }
    .view-toggle { display: flex; gap: 4px; padding: 10px 16px 0; }
    .view-btn { flex: 1; padding: 7px 0; background: none; border: 1px solid transparent; border-radius: 7px; color: var(--muted); font-family: 'Lora', serif; font-size: 11px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px; transition: all 0.15s; }
    .view-btn.active { background: var(--surface2); border-color: var(--border); color: var(--accent); }
    .stats-strip { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
    .stat { flex: 1; padding: 8px 0; text-align: center; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-num { font-size: 16px; font-weight: 600; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-top: 1px; }
    .theme-bar { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .theme-bar::-webkit-scrollbar { display: none; }
    .theme-pill { flex-shrink: 0; padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent-dim); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .theme-pill.active { background: var(--accent-faint); border-color: var(--accent-dim); color: var(--accent); }
    .theme-pill .count { display: inline-block; margin-left: 4px; font-size: 10px; opacity: 0.6; font-family: 'JetBrains Mono', monospace; }
    .action-btns { display: flex; gap: 8px; padding: 10px 16px 0; }
    .action-btn { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--accent-dim); font-family: 'Lora', serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .action-btn.primary { border-color: var(--accent-dim); color: var(--accent); }
    .action-btn.primary:hover { background: var(--accent-faint); }
    .main { height: calc(100vh - 240px); overflow-y: auto; padding: 12px 16px; }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .highlight-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .highlight-card:hover { border-color: #2e2e50; }
    .card-theme { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent-dim); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .card-text { font-size: 12.5px; line-height: 1.7; color: var(--text); border-left: 2px solid var(--accent-dim); padding-left: 10px; font-style: italic; margin-bottom: 8px; }
    .card-note { font-size: 11.5px; color: var(--accent-dim); background: var(--surface2); border-radius: 6px; padding: 7px 10px; margin-bottom: 8px; }
    .card-source { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .card-actions { display: flex; gap: 6px; }
    .card-action-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: 'Lora', serif; transition: color 0.15s; }
    .card-action-btn:hover { color: var(--accent); }
    .card-action-btn.del:hover { color: var(--danger); }
    .theme-group { margin-bottom: 20px; }
    .theme-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .theme-group-name { font-size: 13px; font-weight: 600; color: var(--accent); flex: 1; }
    .theme-group-count { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; color: var(--muted); gap: 12px; }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 13px; line-height: 1.8; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 320px; max-height: 90vh; overflow-y: auto; }
    .modal-box h3 { font-size: 14px; color: var(--accent); margin-bottom: 4px; }
    .modal-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
    .modal-field textarea, .modal-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--text); font-family: 'Lora', serif; font-size: 12px; outline: none; resize: none; box-sizing: border-box; transition: border-color 0.15s; }
    .modal-field textarea:focus, .modal-field input:focus { border-color: var(--accent-dim); }
    .modal-field textarea { height: 90px; line-height: 1.5; }
    .modal-field input { height: 34px; }
    .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .modal-chip { padding: 3px 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--accent-dim); cursor: pointer; transition: all 0.15s; font-family: 'Lora', serif; }
    .modal-chip:hover { border-color: var(--accent-dim); color: var(--accent); }
    .modal-chip.active { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
    .modal-chip.add-new { border-style: dashed; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-secondary { padding: 6px 12px; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-family: 'Lora', serif; font-size: 12px; cursor: pointer; }
    .btn-primary { padding: 6px 14px; background: var(--accent); border: none; border-radius: 7px; color: var(--bg); font-family: 'Lora', serif; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #f0e0c5; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    Context Highlighter
  </div>
  <div class="search-bar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search highlights..."/>
  </div>
</div>
<div class="view-toggle">
  <button class="view-btn active" data-view="all">All</button>
  <button class="view-btn" data-view="themes">By Theme</button>
</div>
<div class="stats-strip">
  <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Saved</div></div>
  <div class="stat"><div class="stat-num" id="stat-themes">0</div><div class="stat-label">Themes</div></div>
</div>
<div class="theme-bar" id="theme-bar"></div>
<div class="action-btns">
  <button class="action-btn primary" id="manual-add-btn">+ Add Manually</button>
  <button class="action-btn" id="export-btn">↓ Export</button>
</div>
<div class="main" id="main-content"></div>

<!-- Manual Add Modal -->
<div class="modal-overlay" id="manual-overlay">
  <div class="modal-box">
    <h3>Add Manually</h3>
    <p class="modal-subtitle">Paste content from Cursor, Slack, or anywhere else.</p>
    <div class="modal-field"><label>Content *</label><textarea id="manual-text" placeholder="Paste the text you want to save..."></textarea></div>
    <div class="modal-field"><label>Note <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#444">(optional)</span></label><input type="text" id="manual-note" placeholder="Add your thoughts..."/></div>
    <div class="modal-field">
      <label>Theme</label>
      <input type="text" id="manual-theme" placeholder="e.g. Key Concepts..."/>
      <div class="modal-chips" id="manual-theme-chips"></div>
    </div>
    <div class="modal-field">
      <label>Route to Agent <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#444">(optional)</span></label>
      <div class="modal-chips" id="manual-agent-chips"></div>
    </div>
    <div class="modal-field"><label>Source <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#444">(optional)</span></label><input type="text" id="manual-source" placeholder="e.g. Slack, Cursor, Notion..."/></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="manual-cancel">Cancel</button>
      <button class="btn-primary" id="manual-save">Save</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-overlay">
  <div class="modal-box">
    <h3>Edit Highlight</h3>
    <div class="modal-field"><label>Content</label><textarea id="edit-text"></textarea></div>
    <div class="modal-field"><label>Note</label><input type="text" id="edit-note" placeholder="Add your thoughts..."/></div>
    <div class="modal-field"><label>Theme</label><input type="text" id="edit-theme" placeholder="e.g. Key Concepts..."/></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="edit-cancel">Cancel</button>
      <button class="btn-primary" id="edit-save">Save Changes</button>
    </div>
  </div>
</div>

<!-- Add Agent Modal -->
<div class="modal-overlay" id="agent-overlay">
  <div class="modal-box">
    <h3>Add New Agent</h3>
    <p class="modal-subtitle">Create a new agent feed. Highlights can be routed to this agent.</p>
    <div class="modal-field"><label>Agent Name *</label><input type="text" id="agent-name" placeholder="e.g. Research Agent, Writing Assistant..."/></div>
    <div class="modal-field"><label>Description <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#444">(optional)</span></label><input type="text" id="agent-description" placeholder="What does this agent do?"/></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="agent-cancel">Cancel</button>
      <button class="btn-primary" id="agent-save">Create Agent</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
